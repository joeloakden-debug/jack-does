<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>

  <!-- Neck -->
  <rect x="86" y="146" width="28" height="22" rx="4" fill="#f0d0b4"/>

  <!-- Blue shirt -->
  <path d="M60 180 Q60 156 86 156 L114 156 Q140 156 140 180 Q140 198 100 198 Q60 198 60 180Z" fill="#2563eb"/>
  <!-- Shirt collar - V shape -->
  <path d="M86 156 L92 156 L100 170 L108 156 L114 156" fill="#1d4ed8"/>
  <path d="M86 156 L100 172" fill="none" stroke="#eff6ff" stroke-width="1.5"/>
  <path d="M114 156 L100 172" fill="none" stroke="#eff6ff" stroke-width="1.5"/>

  <!-- Black tie -->
  <path d="M97 168 L100 172 L103 168 L101 192 L100 196 L99 192 Z" fill="#1e293b"/>
  <!-- Tie knot -->
  <path d="M97 168 Q100 164 103 168 Q100 172 97 168Z" fill="#0f172a"/>
  <!-- Tie clip - silver/metallic -->
  <rect x="98" y="178" width="4" height="2" rx="0.5" fill="#94a3b8"/>
  <rect x="98" y="178" width="4" height="1" rx="0.5" fill="#cbd5e1"/>

  <!-- Face -->
  <ellipse cx="100" cy="106" rx="46" ry="50" fill="#f5dcc0"/>

  <!-- Ears -->
  <ellipse cx="54" cy="106" rx="7" ry="11" fill="#eecfab"/>
  <path d="M54 100 Q57 102 56 108" fill="none" stroke="#ddb994" stroke-width="1" opacity="0.5"/>
  <ellipse cx="146" cy="106" rx="7" ry="11" fill="#eecfab"/>
  <path d="M146 100 Q143 102 144 108" fill="none" stroke="#ddb994" stroke-width="1" opacity="0.5"/>

  <!-- Brown hair - side parted -->
  <!-- Base hair shape -->
  <path d="M54 94 Q52 54 72 42 Q88 34 100 32 Q112 34 128 42 Q148 54 146 94 L146 76 Q144 50 128 40 Q112 32 100 30 Q88 32 72 40 Q56 50 54 76 Z" fill="#5C3A1E"/>
  <!-- Top volume layer -->
  <path d="M52 86 Q50 46 74 36 Q90 28 100 26 Q110 28 126 36 Q150 46 148 86 Q148 58 138 44 Q124 32 100 28 Q76 32 62 44 Q52 58 52 86Z" fill="#4A2E16"/>
  <!-- Part line on left side -->
  <path d="M74 28 Q76 44 78 60" fill="none" stroke="#3D2512" stroke-width="1.5" opacity="0.5"/>
  <!-- Hair swept right from part -->
  <path d="M74 28 Q100 24 144 42" fill="none" stroke="#4A2E16" stroke-width="3" opacity="0.3"/>
  <path d="M74 30 Q98 28 140 46" fill="none" stroke="#5C3A1E" stroke-width="2" opacity="0.25"/>
  <path d="M74 32 Q96 32 136 50" fill="none" stroke="#5C3A1E" stroke-width="1.5" opacity="0.2"/>
  <!-- Hair over forehead left side (shorter) -->
  <path d="M54 80 Q52 60 62 48 Q68 40 74 36" fill="none" stroke="#4A2E16" stroke-width="2" opacity="0.2"/>
  <!-- Slight highlight for depth -->
  <path d="M90 28 Q100 26 110 28" fill="none" stroke="#7A4E2A" stroke-width="1.5" opacity="0.3"/>

  <!-- Eyebrows - brown, well-groomed -->
  <path d="M70 88 Q78 83 90 86" fill="none" stroke="#4A2E16" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M110 86 Q122 83 130 88" fill="none" stroke="#4A2E16" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Blue eyes -->
  <!-- Eye whites -->
  <ellipse cx="80" cy="100" rx="10" ry="7" fill="#ffffff"/>
  <ellipse cx="120" cy="100" rx="10" ry="7" fill="#ffffff"/>
  <!-- Iris - blue -->
  <circle cx="80" cy="100" r="5.5" fill="#3b82f6"/>
  <circle cx="120" cy="100" r="5.5" fill="#3b82f6"/>
  <!-- Darker ring around iris -->
  <circle cx="80" cy="100" r="5.5" fill="none" stroke="#1d4ed8" stroke-width="0.8"/>
  <circle cx="120" cy="100" r="5.5" fill="none" stroke="#1d4ed8" stroke-width="0.8"/>
  <!-- Pupil -->
  <circle cx="80" cy="100" r="2.5" fill="#0f172a"/>
  <circle cx="120" cy="100" r="2.5" fill="#0f172a"/>
  <!-- Eye shine -->
  <circle cx="83" cy="98" r="2" fill="#ffffff"/>
  <circle cx="123" cy="98" r="2" fill="#ffffff"/>
  <circle cx="78" cy="102" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="118" cy="102" r="1" fill="#ffffff" opacity="0.4"/>
  <!-- Eyelids/lashes - subtle -->
  <path d="M70 98 Q80 92 90 98" fill="none" stroke="#4A2E16" stroke-width="1" opacity="0.3"/>
  <path d="M110 98 Q120 92 130 98" fill="none" stroke="#4A2E16" stroke-width="1" opacity="0.3"/>

  <!-- Black thick-rimmed glasses -->
  <rect x="64" y="90" width="30" height="22" rx="5" fill="none" stroke="#1e293b" stroke-width="3.5"/>
  <rect x="106" y="90" width="30" height="22" rx="5" fill="none" stroke="#1e293b" stroke-width="3.5"/>
  <!-- Bridge -->
  <path d="M94 100 Q100 95 106 100" fill="none" stroke="#1e293b" stroke-width="3"/>
  <!-- Temple arms going to ears -->
  <path d="M64 97 L56 95" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
  <path d="M136 97 L144 95" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M100 104 Q98 118 95 122 Q98 124 100 124 Q102 124 105 122 Q102 118 100 104" fill="none" stroke="#d4a882" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Friendly smile - warm and open -->
  <path d="M82 134 Q90 144 100 145 Q110 144 118 134" fill="none" stroke="#c0694e" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Slight teeth showing for friendly look -->
  <path d="M88 136 Q100 142 112 136" fill="#ffffff" stroke="none" opacity="0.7"/>
  <!-- Cheek warmth -->
  <circle cx="68" cy="124" r="7" fill="#f0b8a0" opacity="0.12"/>
  <circle cx="132" cy="124" r="7" fill="#f0b8a0" opacity="0.12"/>
</svg>
