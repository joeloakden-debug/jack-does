<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="jack does">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../jack-avatar-clean.png">
  <title>client login | jack does</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="../jack-avatar-clean.png" alt="jack" class="login-avatar">
        <h1 class="login-brand">jack does</h1>
        <p class="login-subtitle">client portal</p>
      </div>
      <form class="login-form" id="login-form">
        <div class="form-group">
          <label for="email">email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
          <label for="password">password</label>
          <input type="password" id="password" name="password" placeholder="your password" required>
        </div>
        <div id="login-error" class="login-error" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-full">sign in</button>
      </form>
      <div class="login-footer">
        <a href="../index.html">back to site</a>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');

      try {
        const res = await fetch('/api/portal/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (data.success) {
          document.cookie = `portal_client=${data.clientId};path=/;max-age=86400`;
          window.location.href = 'dashboard.html';
        } else {
          errorEl.textContent = 'invalid email or password';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'could not connect to server';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
